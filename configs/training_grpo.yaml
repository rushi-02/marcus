# GRPO Training Configuration
# Use with: marcus train grpo --config configs/training_grpo.yaml

training:
  grpo_group_size: 4
  grpo_lr: 5.0e-5
  grpo_epochs: 1
  min_feedback_samples: 50

llm:
  model_id: "mlx-community/Llama-3.2-3B-Instruct-4bit"
  adapter_path: "adapters/marcus-sft-v1"

data:
  data_dir: "data"
