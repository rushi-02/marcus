# SFT Training Configuration
# Use with: marcus train sft --config configs/training_sft.yaml

training:
  sft_epochs: 3
  sft_lr: 1.0e-4
  lora_rank: 16
  lora_alpha: 32
  lora_layers: 16
  batch_size: 4
  max_seq_length: 2048

llm:
  model_id: "mlx-community/Llama-3.2-3B-Instruct-4bit"

data:
  data_dir: "data"
  val_ratio: 0.1
