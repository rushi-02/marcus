# Marcus — Default Configuration
# Override any value here; missing keys use Pydantic defaults.

asr:
  model_id: "mlx-community/whisper-small"
  language: "en"
  stream: true

llm:
  model_id: "mlx-community/Llama-3.2-3B-Instruct-4bit"
  adapter_path: null  # set to "adapters/marcus-sft-v1" after fine-tuning
  max_tokens: 256
  temperature: 0.7
  top_p: 0.9
  system_prompt_path: "configs/system_prompt.txt"

tts:
  model_id: "lucasnewman/f5-tts-mlx"
  voice_ref_path: "data/reference_voice/marcus_voice.wav"
  sample_rate: 24000
  streaming: true

audio:
  sample_rate: 16000
  channels: 1
  chunk_duration: 0.5
  silence_threshold: 0.01
  silence_duration: 1.5
  playback_chunk_ms: 100

training:
  sft_epochs: 3
  sft_lr: 1.0e-4
  lora_rank: 16
  lora_alpha: 32
  lora_layers: 16
  batch_size: 4
  max_seq_length: 2048
  grpo_group_size: 4
  grpo_lr: 5.0e-5
  grpo_epochs: 1
  min_feedback_samples: 50

data:
  data_dir: "data"
  synthesis_model: "claude-sonnet-4-20250514"
  pairs_per_passage: 1
  target_pairs: 1500
  val_ratio: 0.1
